<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS AI Grade Tracker | Global Citizens</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const { useState, useEffect } = React;

        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyA1fpS3ftTOuiiKCzB1RO_PB00IpDdcaHE",
            authDomain: "ssgradetracker.firebaseapp.com",
            projectId: "ssgradetracker",
            storageBucket: "ssgradetracker.firebasestorage.app",
            messagingSenderId: "271487711446",
            appId: "1:271487711446:web:6b4c2bad5f7ca693b17177"
        };

        const GEMINI_API_KEY = "AIzaSyAo5-l1ZU0aRwUOmt7H42vyt3DPQZlKeb0";

        // Initialize Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const STUDENTS_REF = db.collection('students');
        
        // Initialize Gemini
        const genAI = new GoogleGenerativeAI(GEMINI_API_KEY);

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [formData, setFormData] = useState({ name: '', grade: '', target: '' });
            const [aiResult, setAiResult] = useState({ id: null, text: '' });
            const [loading, setLoading] = useState(true);
            const [isGenerating, setIsGenerating] = useState(false);

            // --- 2. LIVE DATA LISTENER ---
            useEffect(() => {
                const unsubscribe = STUDENTS_REF.orderBy('name').onSnapshot(snap => {
                    setStudents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // --- 3. AI GENERATION (The "Basis" from AI Studio) ---
            const handleGenerateAI = async (student) => {
                setIsGenerating(true);
                setAiResult({ id: student.id, text: "Consulting Gemini AI..." });
                
                try {
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `You are an expert Social Studies and Geography educator. 
                        Write a professional report comment for ${student.name}. 
                        Current Grade: ${student.grade}%. Target: ${student.target}%.
                        Requirements:
                        - Focus on the 'Global Citizens' framework.
                        - Be encouraging but precise.
                        - Maximum 45 words.`;

                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    setAiResult({ id: student.id, text: response.text() });
                } catch (error) {
                    setAiResult({ id: student.id, text: "Error: Could not connect to AI. Check API Key." });
                }
                setIsGenerating(false);
            };

            // --- 4. DATA ACTIONS ---
            const handleSave = async (e) => {
                e.preventDefault();
                await STUDENTS_REF.doc(formData.name).set({
                    name: formData.name,
                    grade: Number(formData.grade),
                    target: Number(formData.target),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                setFormData({ name: '', grade: '', target: '' });
                setView('dashboard');
            };

            const deleteStudent = (id) => {
                if(confirm("Delete this record?")) STUDENTS_REF.doc(id).delete();
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* Navigation Bar */}
                    <nav className="glass sticky top-0 z-50 border-b border-slate-200 px-6 py-4 mb-8">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div>
                                <h1 className="text-xl font-extrabold tracking-tighter text-slate-900">SS TRACKER <span className="text-blue-600">v2.0</span></h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Global Citizens Curriculum</p>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setView('dashboard')} className={`text-sm font-bold ${view === 'dashboard' ? 'text-blue-600' : 'text-slate-400'}`}>LIST</button>
                                <button onClick={() => setView('add')} className="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold text-xs hover:bg-blue-600 transition">ADD STUDENT</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6">
                        {view === 'add' ? (
                            <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm max-w-md mx-auto animate-in fade-in slide-in-from-bottom-4">
                                <h2 className="text-2xl font-extrabold mb-6">New Entry</h2>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase">Student Name</label>
                                        <input type="text" placeholder="Full Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none transition" required />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase">Current %</label>
                                            <input type="number" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none transition" required />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-black text-slate-400 uppercase">Target %</label>
                                            <input type="number" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-xl outline-none transition" required />
                                        </div>
                                    </div>
                                    <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 hover:scale-[1.02] active:scale-95 transition">SAVE STUDENT</button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {loading ? (
                                    <div className="text-center py-20 text-slate-400 font-bold italic">Loading Database...</div>
                                ) : students.length === 0 ? (
                                    <div className="text-center py-20 bg-white border-2 border-dashed rounded-2xl text-slate-400 font-bold">No students found. Click "Add Student" to start.</div>
                                ) : (
                                    students.map(s => (
                                        <div key={s.id} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md transition">
                                            <div className="flex justify-between items-center mb-4">
                                                <div>
                                                    <h3 className="text-lg font-extrabold text-slate-800">{s.name}</h3>
                                                    <p className="text-[10px] text-slate-400 font-black uppercase">Target Achievement: {s.target}%</p>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="text-right">
                                                        <span className={`text-3xl font-black ${s.grade >= s.target ? 'text-green-500' : 'text-amber-500'}`}>{s.grade}%</span>
                                                    </div>
                                                    <button 
                                                        disabled={isGenerating}
                                                        onClick={() => handleGenerateAI(s)}
                                                        className="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl text-xs font-black border border-blue-100 hover:bg-blue-600 hover:text-white transition disabled:opacity-50"
                                                    >
                                                        {isGenerating && aiResult.id === s.id ? "WRITING..." : "AI COMMENT"}
                                                    </button>
                                                    <button onClick={() => deleteStudent(s.id)} className="text-slate-300 hover:text-red-500 transition">✕</button>
                                                </div>
                                            </div>
                                            
                                            {/* AI RESULT BOX */}
                                            {aiResult.id === s.id && (
                                                <div className="mt-4 p-4 bg-slate-50 border-l-4 border-blue-500 rounded-r-xl text-sm text-slate-600 leading-relaxed italic">
                                                    {aiResult.text}
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
