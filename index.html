<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS AI Grade Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/@google/generative-ai@0.1.0/dist/index.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Accessing libraries from the global 'window' object to avoid 'require' errors
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyA1fpS3ftTOuiiKCzB1RO_PB00IpDdcaHE",
            authDomain: "ssgradetracker.firebaseapp.com",
            projectId: "ssgradetracker",
            storageBucket: "ssgradetracker.firebasestorage.app",
            messagingSenderId: "271487711446",
            appId: "1:271487711446:web:6b4c2bad5f7ca693b17177"
        };

        const GEMINI_API_KEY = "AIzaSyAo5-l1ZU0aRwUOmt7H42vyt3DPQZlKeb0";

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const STUDENTS_REF = db.collection('students');

        const App = () => {
            const [view, setView] = useState('list');
            const [students, setStudents] = useState([]);
            const [formData, setFormData] = useState({ name: '', grade: '', target: '' });
            const [aiResult, setAiResult] = useState({ id: null, text: '' });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = STUDENTS_REF.orderBy('name').onSnapshot(snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStudents(data);
                    setLoading(false);
                }, (err) => {
                    console.error("Firebase connection error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleAI = async (student) => {
                setAiResult({ id: student.id, text: "Generating comment..." });
                try {
                    // Using the Global constructor provided by the script tag in head
                    const genAI = new window.googleGenerativeAI.GoogleGenerativeAI(GEMINI_API_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Write a short Social Studies report for ${student.name}. Grade: ${student.grade}%, Target: ${student.target}%. Use Global Citizens framework. Max 40 words.`;
                    
                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    setAiResult({ id: student.id, text: response.text() });
                } catch (e) {
                    console.error(e);
                    setAiResult({ id: student.id, text: "AI error. Check connection." });
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                await STUDENTS_REF.doc(formData.name).set({
                    name: formData.name,
                    grade: Number(formData.grade),
                    target: Number(formData.target)
                }, { merge: true });
                setFormData({ name: '', grade: '', target: '' });
                setView('list');
            };

            return (
                <div className="max-w-2xl mx-auto p-4 md:p-8">
                    <nav className="flex justify-between items-center mb-8 bg-white p-5 rounded-2xl border shadow-sm">
                        <h1 className="font-extrabold text-xl">SS TRACKER <span className="text-blue-600 font-black">AI</span></h1>
                        <div className="flex gap-4">
                            <button onClick={() => setView('list')} className={`text-sm font-bold ${view === 'list' ? 'text-blue-600' : 'text-slate-400'}`}>LIST</button>
                            <button onClick={() => setView('add')} className="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-wider">Add Student</button>
                        </div>
                    </nav>

                    {view === 'add' ? (
                        <div className="bg-white p-8 rounded-2xl border shadow-sm max-w-md mx-auto">
                            <h2 className="text-xl font-bold mb-6">New Record</h2>
                            <form onSubmit={handleSave} className="space-y-4">
                                <input placeholder="Student Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 ring-blue-500" required />
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="Grade %" type="number" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none" required />
                                    <input placeholder="Target %" type="number" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl outline-none" required />
                                </div>
                                <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg transition hover:bg-blue-700 active:scale-95">SAVE STUDENT</button>
                            </form>
                        </div>
                    ) : (
                        <div className="space-y-4">
                            {loading ? (
                                <p className="text-center py-10 font-bold text-slate-300 italic animate-pulse">Connecting to Database...</p>
                            ) : students.length === 0 ? (
                                <div className="text-center py-12 bg-white border-2 border-dashed rounded-2xl text-slate-400 font-bold">No students found. Add one to begin.</div>
                            ) : (
                                students.map(s => (
                                    <div key={s.id} className="bg-white p-6 rounded-2xl border shadow-sm border-slate-200">
                                        <div className="flex justify-between items-center mb-4">
                                            <div>
                                                <h3 className="font-extrabold text-lg text-slate-800">{s.name}</h3>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Target: {s.target}%</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className={`text-2xl font-black ${s.grade >= s.target ? 'text-green-500' : 'text-amber-500'}`}>{s.grade}%</span>
                                                <button onClick={() => handleAI(s)} className="bg-blue-50 text-blue-700 px-4 py-2 rounded-xl text-[10px] font-black border border-blue-100 hover:bg-blue-600 hover:text-white transition uppercase">AI Report</button>
                                                <button onClick={() => {if(confirm("Delete record?")) STUDENTS_REF.doc(s.id).delete()}} className="text-slate-200 hover:text-red-500 transition">✕</button>
                                            </div>
                                        </div>
                                        {aiResult.id === s.id && (
                                            <div className="mt-4 p-4 bg-slate-50 rounded-xl border-l-4 border-blue-500 text-sm text-slate-600 italic">
                                                {aiResult.text}
                                            </div>
                                        )}
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
