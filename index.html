<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS AI Grade Tracker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        window.GoogleGenerativeAI = GoogleGenerativeAI;
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 1. CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyA1fpS3ftTOuiiKCzB1RO_PB00IpDdcaHE",
            authDomain: "ssgradetracker.firebaseapp.com",
            projectId: "ssgradetracker",
            storageBucket: "ssgradetracker.firebasestorage.app",
            messagingSenderId: "271487711446",
            appId: "1:271487711446:web:6b4c2bad5f7ca693b17177"
        };

        const GEMINI_API_KEY = "AIzaSyAo5-l1ZU0aRwUOmt7H42vyt3DPQZlKeb0";

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const STUDENTS_REF = db.collection('students');

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [formData, setFormData] = useState({ name: '', grade: '', target: '' });
            const [aiResult, setAiResult] = useState({ id: null, text: '' });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = STUDENTS_REF.orderBy('name').onSnapshot(snap => {
                    setStudents(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, (err) => {
                    console.error("Firebase Error:", err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            const handleAI = async (student) => {
                setAiResult({ id: student.id, text: "Generating comment..." });
                try {
                    const genAI = new window.GoogleGenerativeAI(GEMINI_API_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Student: ${student.name}. Grade: ${student.grade}%. Target: ${student.target}%. Write a short, professional Social Studies report comment using the Global Citizens framework. Max 40 words.`;
                    const result = await model.generateContent(prompt);
                    setAiResult({ id: student.id, text: result.response.text() });
                } catch (e) {
                    setAiResult({ id: student.id, text: "AI error. Check API Key." });
                }
            };

            const handleSave = async (e) => {
                e.preventDefault();
                await STUDENTS_REF.doc(formData.name).set({
                    name: formData.name,
                    grade: Number(formData.grade),
                    target: Number(formData.target)
                }, { merge: true });
                setFormData({ name: '', grade: '', target: '' });
                setView('dashboard');
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white border-b p-4 mb-8 sticky top-0 shadow-sm z-10">
                        <div className="max-w-3xl mx-auto flex justify-between items-center">
                            <h1 className="font-extrabold text-xl tracking-tight text-slate-900">SS TRACKER <span className="text-blue-600">AI</span></h1>
                            <div className="flex gap-4">
                                <button onClick={() => setView('dashboard')} className="font-bold text-sm text-slate-500">LIST</button>
                                <button onClick={() => setView('add')} className="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-700">ADD +</button>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-3xl mx-auto px-4">
                        {view === 'add' ? (
                            <div className="bg-white p-6 rounded-xl border shadow-sm max-w-md mx-auto">
                                <h2 className="text-xl font-bold mb-4">New Student</h2>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <input type="text" placeholder="Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-lg outline-none" required />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Grade %" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} className="p-3 bg-slate-50 border rounded-lg outline-none" required />
                                        <input type="number" placeholder="Target %" value={formData.target} onChange={e => setFormData({...formData, target: e.target.value})} className="p-3 bg-slate-50 border rounded-lg outline-none" required />
                                    </div>
                                    <button className="w-full bg-slate-900 text-white py-3 rounded-lg font-bold">SAVE</button>
                                </form>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {loading ? <p className="text-center text-slate-400">Loading students...</p> : 
                                students.map(s => (
                                    <div key={s.id} className="bg-white p-5 rounded-xl border shadow-sm">
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <h3 className="font-bold text-lg">{s.name}</h3>
                                                <p className="text-xs font-bold text-slate-400 uppercase">Target: {s.target}%</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className={`text-2xl font-black ${s.grade >= s.target ? 'text-green-500' : 'text-amber-500'}`}>{s.grade}%</span>
                                                <button onClick={() => handleAI(s)} className="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-100">AI COMMENT</button>
                                                <button onClick={() => {if(confirm("Delete?")) STUDENTS_REF.doc(s.id).delete()}} className="text-slate-200 hover:text-red-500 font-bold ml-2">✕</button>
                                            </div>
                                        </div>
                                        {aiResult.id === s.id && (
                                            <div className="mt-4 p-3 bg-slate-50 rounded-lg text-sm text-slate-600 border-l-4 border-blue-500 italic">
                                                {aiResult.text}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
